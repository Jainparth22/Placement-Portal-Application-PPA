<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal</title>
    <meta name="description"
        content="Campus Placement Portal - Manage recruitment drives, applications, and placements">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="app-sidebar" :class="{show: sidebarOpen}" v-if="isLoggedIn">
            <div class="sidebar-brand">
                <i class="bi bi-mortarboard-fill"></i>
                <span>PlacementPortal</span>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section">Main</div>
                <a href="#" @click.prevent="navigate('dashboard');sidebarOpen=false"
                    :class="{active: currentPage==='dashboard'}">
                    <i class="bi bi-grid-1x2"></i>Dashboard
                </a>
                <template v-if="user.role==='admin'">
                    <div class="sidebar-section">Manage</div>
                    <a href="#" @click.prevent="navigate('admin-companies');sidebarOpen=false"
                        :class="{active: currentPage==='admin-companies'}">
                        <i class="bi bi-building"></i>Companies
                    </a>
                    <a href="#" @click.prevent="navigate('admin-drives');sidebarOpen=false"
                        :class="{active: currentPage==='admin-drives'}">
                        <i class="bi bi-briefcase"></i>Drives
                    </a>
                    <a href="#" @click.prevent="navigate('admin-students');sidebarOpen=false"
                        :class="{active: currentPage==='admin-students'}">
                        <i class="bi bi-people"></i>Students
                    </a>
                    <a href="#" @click.prevent="navigate('admin-applications');sidebarOpen=false"
                        :class="{active: currentPage==='admin-applications'}">
                        <i class="bi bi-file-earmark-text"></i>Applications
                    </a>
                    <div class="sidebar-section">Reports</div>
                    <a href="#" @click.prevent="navigate('admin-reports');sidebarOpen=false"
                        :class="{active: currentPage==='admin-reports'}">
                        <i class="bi bi-graph-up"></i>Reports
                    </a>
                </template>
                <template v-if="user.role==='company'">
                    <div class="sidebar-section">Company</div>
                    <a href="#" @click.prevent="navigate('company-drives');sidebarOpen=false"
                        :class="{active: currentPage==='company-drives'}">
                        <i class="bi bi-briefcase"></i>My Drives
                    </a>
                    <a href="#" @click.prevent="navigate('company-profile');sidebarOpen=false"
                        :class="{active: currentPage==='company-profile'}">
                        <i class="bi bi-gear"></i>Profile
                    </a>
                </template>
                <template v-if="user.role==='student'">
                    <div class="sidebar-section">Explore</div>
                    <a href="#" @click.prevent="navigate('student-drives');sidebarOpen=false"
                        :class="{active: currentPage==='student-drives'}">
                        <i class="bi bi-briefcase"></i>Browse Drives
                    </a>
                    <a href="#" @click.prevent="navigate('student-applications');sidebarOpen=false"
                        :class="{active: currentPage==='student-applications'}">
                        <i class="bi bi-file-earmark-text"></i>My Applications
                    </a>
                    <a href="#" @click.prevent="navigate('student-interviews');sidebarOpen=false"
                        :class="{active: currentPage==='student-interviews'}">
                        <i class="bi bi-camera-video"></i>Interviews
                    </a>
                    <div class="sidebar-section">Account</div>
                    <a href="#" @click.prevent="navigate('student-history');sidebarOpen=false"
                        :class="{active: currentPage==='student-history'}">
                        <i class="bi bi-clock-history"></i>History
                    </a>
                    <a href="#" @click.prevent="navigate('student-profile');sidebarOpen=false"
                        :class="{active: currentPage==='student-profile'}">
                        <i class="bi bi-person"></i>Profile
                    </a>
                </template>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-user-avatar">${user.email ? user.email[0].toUpperCase() : '?'}</div>
                    <div class="sidebar-user-info">
                        <small>${user.email}</small>
                        <span class="role-tag">${user.role}</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Mobile sidebar overlay -->
        <div class="sidebar-overlay" v-if="sidebarOpen && isLoggedIn" @click="sidebarOpen=false"></div>

        <!-- Topbar -->
        <header class="app-topbar" v-if="isLoggedIn">
            <div class="topbar-left">
                <button class="sidebar-toggle" @click="sidebarOpen=!sidebarOpen">
                    <i class="bi bi-list"></i>
                </button>
                <h5>${pageTitle}</h5>
            </div>
            <div class="topbar-right">
                <button class="btn-theme-toggle" @click="toggleTheme" :title="darkMode?'Light mode':'Dark mode'">
                    <i :class="darkMode?'bi bi-sun':'bi bi-moon'"></i>
                </button>
                <div class="dropdown">
                    <button class="btn btn-sm btn-outline-secondary position-relative" data-bs-toggle="dropdown">
                        <i class="bi bi-bell"></i>
                        <span v-if="unreadNotifications>0"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">${unreadNotifications}</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end notification-dropdown">
                        <li class="dropdown-header d-flex justify-content-between">
                            <strong>Notifications</strong><a href="#" @click.prevent="markAllRead"
                                class="text-primary small">Mark all read</a>
                        </li>
                        <li v-if="notifications.length===0"><span class="dropdown-item text-muted small">No
                                notifications</span></li>
                        <li v-for="n in notifications.slice(0,10)" :key="n.id"><a class="dropdown-item small"
                                :class="{'fw-bold':!n.is_read}" href="#"
                                @click.prevent="markRead(n.id)">${n.message}<br><small
                                    class="text-muted">${formatDate(n.created_at)}</small></a></li>
